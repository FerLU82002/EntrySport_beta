# Configuración de Nginx para EntrySport
# Ubicación en el servidor: /etc/nginx/sites-available/entrysport

upstream entrysport_app {
    # Configuración del servidor Node.js
    # PM2 manejará el clustering, aquí apuntamos al puerto donde corre Next.js
    server 127.0.0.1:3000;
    keepalive 64;
}

# Redirección de HTTP a HTTPS (descomenta cuando tengas SSL configurado)
# server {
#     listen 80;
#     listen [::]:80;
#     server_name tu-dominio.com www.tu-dominio.com;
#     return 301 https://$server_name$request_uri;
# }

server {
    listen 80;
    listen [::]:80;
    
    # Cambia esto por tu dominio o IP pública
    server_name tu-dominio.com www.tu-dominio.com;
    
    # Para HTTPS (descomenta cuando tengas SSL)
    # listen 443 ssl http2;
    # listen [::]:443 ssl http2;
    # ssl_certificate /etc/letsencrypt/live/tu-dominio.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/tu-dominio.com/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;
    # ssl_prefer_server_ciphers on;
    
    # Logs
    access_log /var/log/nginx/entrysport_access.log;
    error_log /var/log/nginx/entrysport_error.log;
    
    # Tamaño máximo de body (para subir imágenes)
    client_max_body_size 10M;
    
    # Compresión gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;
    gzip_disable "MSIE [1-6]\.";
    
    # Archivos estáticos de Next.js
    location /_next/static/ {
        proxy_cache_valid 200 60m;
        proxy_pass http://entrysport_app;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    
    # Imágenes y archivos públicos
    location /public/ {
        proxy_pass http://entrysport_app;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=86400";
    }
    
    # Favicon
    location = /favicon.ico {
        proxy_pass http://entrysport_app;
        access_log off;
        log_not_found off;
        add_header Cache-Control "public, max-age=604800";
    }
    
    # Todas las demás rutas (Next.js App Router)
    location / {
        proxy_pass http://entrysport_app;
        proxy_http_version 1.1;
        
        # Headers para proxy
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Caché del proxy desactivado para contenido dinámico
        proxy_cache_bypass $http_upgrade;
        proxy_no_cache $http_upgrade;
    }
    
    # Health check endpoint
    location /api/health {
        proxy_pass http://entrysport_app;
        access_log off;
    }
}
