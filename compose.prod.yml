services:
  web:
    image: "${DOCKER_IMAGE_REGISTRY}/entrysport-web:latest"
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        - NEXT_PUBLIC_GA_MEASUREMENT_ID=${NEXT_PUBLIC_GA_MEASUREMENT_ID}
        - NEXT_PUBLIC_CULQI_PUBLIC_KEY=${NEXT_PUBLIC_CULQI_PUBLIC_KEY}
        - NEXT_PUBLIC_CULQI_ORDER_ID=${NEXT_PUBLIC_CULQI_ORDER_ID}
        - NEXT_PUBLIC_CULQI_RSA_ID=${NEXT_PUBLIC_CULQI_RSA_ID}
        - NEXT_PUBLIC_CULQI_RSA_PUBLIC_KEY=${NEXT_PUBLIC_CULQI_RSA_PUBLIC_KEY}
        - NEXT_PUBLIC_CULQI_TITLE=${NEXT_PUBLIC_CULQI_TITLE}
    volumes:
      - ./public:/app/public
  nginx:
    image: nginx:1.29-alpine
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./docker/www/production/nginx.conf.template:/etc/nginx/conf.d/default.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/html
    environment:
      SSL_DOMAIN_1: ${SSL_DOMAIN_1}
    depends_on:
      - web
volumes:
  certbot-etc:
  certbot-webroot:
